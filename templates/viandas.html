
{% extends 'base.html' %}
{% block content %}
<div class='d-flex justify-content-between mb-4'>
    <h2>Gestionar Viandas</h2>
    <button class='btn btn-success' data-bs-toggle='collapse' data-bs-target='#f'>+ Nueva Vianda</button>
</div>
<div class='collapse mb-4' id='f'>
    <form method='POST' class='card card-body'>
        <div class='row g-2'>
            <div class='col-md-4'><input name='nombre' class='form-control' placeholder='Nombre' required></div>
            <div class='col-md-3'><input type='number' name='precio' class='form-control' placeholder='Precio' required></div>
            <div class='col-md-3'>
                <select name='tipo' class='form-control'>
                    <option value='diaria'>Pago Diario</option>
                    <option value='semanal'>Suscripción Semanal</option>
                    <option value='mensual'>Suscripción Mensual</option>
                </select>
            </div>
            <div class='col-md-2'><button class='btn btn-primary w-100'>Guardar</button></div>
        </div>
    </form>
</div>
<table class='table table-hover bg-white rounded shadow-sm'>
    <thead><tr><th>Nombre</th><th>Tipo</th><th>Precio</th></tr></thead>
    <tbody>
        {% for v in viandas %}<tr><td>{{v.nombre}}</td><td>{{v.tipo}}</td><td>${{v.precio}}</td></tr>{% endfor %}
    </tbody>
</table>
{% endblock %}
