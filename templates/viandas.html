
{% extends 'base.html' %}
{% block content %}
<div class='d-flex justify-content-between align-items-center mb-4'>
    <h2>Menú de Viandas</h2>
    <button class='btn btn-success' data-bs-toggle='modal' data-bs-target='#addVianda'>+ Nueva Vianda</button>
</div>
<div class='card shadow-sm'>
    <div class='table-responsive'>
        <table class='table table-hover mb-0'>
            <thead class='table-light'>
                <tr>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for v in viandas %}
                <tr>
                    <td>{{ v.nombre }}</td>
                    <td>{{ v.descripcion }}</td>
                    <td>${{ v.precio }}</td>
                    <td><span class='badge bg-{{ "success" if v.disponible else "danger" }}'>{{ "Disponible" if v.disponible else "Agotada" }}</span></td>
                    <td>
                        <button class='btn btn-sm btn-outline-primary'><i class='fas fa-edit'></i></button>
                        <button class='btn btn-sm btn-outline-danger'><i class='fas fa-trash'></i></button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
