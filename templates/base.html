
<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Viandas Pro</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css'>
    <link rel='stylesheet' href='{{ url_for("static", filename="css/style.css") }}'>
</head>
<body class='bg-light'>
    <nav class='navbar navbar-expand-lg navbar-dark'>
        <div class='container'>
            <a class='navbar-brand' href='/'>🍱 Viandas Comercio</a>
            <button class='navbar-toggler' type='button' data-bs-toggle='collapse' data-bs-target='#navbarNav'>
                <span class='navbar-toggler-icon'></span>
            </button>
            <div class='collapse navbar-collapse' id='navbarNav'>
                <div class='navbar-nav ms-auto'>
                    <a class='nav-link' href='/'><i class='fas fa-chart-line'></i> Dashboard</a>
                    <a class='nav-link' href='/viandas'><i class='fas fa-utensils'></i> Menú</a>
                    <a class='nav-link' href='/salidas'><i class='fas fa-arrow-down'></i> Salidas</a>
                </div>
            </div>
        </div>
    </nav>
    <div class='container mt-4'>
        {% block content %}{% endblock %}
    </div>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'></script>
</body>
</html>
