
{% extends 'base.html' %}
{% block content %}
<div class='d-flex justify-content-between align-items-center mb-4'>
    <h2>Registrar Salidas / Gastos</h2>
    <button class='btn btn-danger' data-bs-toggle='collapse' data-bs-target='#formSalida'>+ Nuevo Gasto</button>
</div>

<div class='collapse mb-4' id='formSalida'>
    <div class='card card-body'>
        <form method='POST'>
            <div class='row'>
                <div class='col-md-5'>
                    <input type='text' name='categoria' class='form-control' placeholder='Categoría (Ej: Alquiler, Insumos)' required>
                </div>
                <div class='col-md-4'>
                    <input type='number' step='0.01' name='monto' class='form-control' placeholder='Monto $' required>
                </div>
                <div class='col-md-3'>
                    <button type='submit' class='btn btn-danger w-100'>Registrar Gasto</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class='card shadow-sm'>
    <table class='table'>
        <thead class='table-dark'>
            <tr>
                <th>Fecha</th>
                <th>Categoría</th>
                <th>Monto</th>
            </tr>
        </thead>
        <tbody>
            {% for e in egresos %}
            <tr>
                <td>{{ e.fecha.strftime('%d/%m/%Y') }}</td>
                <td>{{ e.categoria }}</td>
                <td>${{ "%.2f"|format(e.monto) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
