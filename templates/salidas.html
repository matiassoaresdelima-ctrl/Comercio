
{% extends 'base.html' %}
{% block content %}
<h2>Registrar Salidas / Costos</h2>
<div class='card card-body mb-4'>
    <form method='POST'>
        <div class='row'>
            <div class='col-md-3'><input type='text' name='categoria' class='form-control' placeholder='Categoría (Ej: Insumos)' required></div>
            <div class='col-md-3'><input type='number' step='0.01' name='monto' class='form-control' placeholder='Monto $' required></div>
            <div class='col-md-4'><input type='text' name='descripcion' class='form-control' placeholder='Descripción'></div>
            <div class='col-md-2'><button type='submit' class='btn btn-danger w-100'>Registrar Gasto</button></div>
        </div>
    </form>
</div>
<div class='card shadow-sm'>
    <table class='table'>
        <thead><tr><th>Fecha</th><th>Categoría</th><th>Monto</th><th>Descripción</th></tr></thead>
        <tbody>
            {% for e in egresos %}<tr><td>{{ e.fecha.strftime('%d/%m/%Y') }}</td><td>{{ e.categoria }}</td><td>${{ e.monto }}</td><td>{{ e.descripcion }}</td></tr>{% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
